services:
  - type: web
    name: cj-ai-backend
    env: python
    region: oregon
    plan: free
    rootDir: cj-web/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: SESSION_SECRET
        sync: false          # set manually in Render dashboard
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: QDRANT_URL
        sync: false          # set manually in Render dashboard
      - key: QDRANT_API_KEY
        sync: false          # set manually in Render dashboard
